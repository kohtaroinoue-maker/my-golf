<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>My Golf</title>
<style>
:root {
  --primary: #1a5632;
  --accent: #2e8b57;
  --light: #f0f7f2;
  --bg: #f5f6f0;
  --text: #333;
  --border: #d4ddd6;
  --muted: #888;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN",
    "Hiragino Sans", "Yu Gothic", Meiryo, sans-serif;
  color: var(--text);
  background: var(--bg);
  line-height: 1.7;
}

/* ================================================================
   ヒーロー
   ================================================================ */
.hero {
  background: linear-gradient(135deg, #1a5632 0%, #2e8b57 50%, #3fa96b 100%);
  color: #fff;
  padding: 60px 20px 50px;
  text-align: center;
}

.hero h1 {
  font-size: 36px;
  font-weight: 800;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.hero .tagline {
  font-size: 14px;
  opacity: 0.75;
  letter-spacing: 1px;
}

/* ================================================================
   メインコンテナ
   ================================================================ */
.main {
  max-width: 960px;
  margin: -30px auto 40px;
  padding: 0 20px;
}

/* ================================================================
   ダッシュボード サマリー
   ================================================================ */
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}

.dash-card {
  background: #fff;
  border-radius: 12px;
  padding: 24px 16px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.dash-card .number {
  font-size: 36px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.dash-card .label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ================================================================
   セクション
   ================================================================ */
.section {
  background: #fff;
  border-radius: 12px;
  padding: 30px 36px;
  margin-bottom: 24px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
}

.section h2 {
  font-size: 16px;
  color: var(--primary);
  border-left: 4px solid var(--primary);
  padding-left: 12px;
  margin-bottom: 20px;
}

/* ================================================================
   最近のラウンド
   ================================================================ */
.recent-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

.recent-table th,
.recent-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.recent-table th {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.recent-table td:first-child {
  text-align: left;
}

.recent-table th:first-child {
  text-align: left;
}

.recent-table tbody tr:hover {
  background: var(--light);
}

.no-data {
  text-align: center;
  padding: 30px;
  color: #ccc;
  font-size: 13px;
}

/* ================================================================
   コース一覧
   ================================================================ */
.course-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.course-row {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  text-decoration: none;
  color: inherit;
  transition: box-shadow 0.2s, transform 0.15s;
}

.course-row:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  transform: translateY(-2px);
}

.course-row .thumb {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  object-fit: cover;
  background: #1a3a1a;
  flex-shrink: 0;
}

.course-row .info {
  flex: 1;
  min-width: 0;
}

.course-row .info .name {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
}

.course-row .info .detail {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.course-row .mini-stats {
  display: flex;
  gap: 20px;
  flex-shrink: 0;
}

.course-row .mini-stat {
  text-align: center;
}

.course-row .mini-stat .val {
  font-size: 20px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1;
}

.course-row .mini-stat .lbl {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  text-transform: uppercase;
}

/* ================================================================
   フッター
   ================================================================ */
.footer {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: #ccc;
}

/* ================================================================
   Responsive
   ================================================================ */
@media (max-width: 768px) {
  .hero { padding: 40px 20px 35px; }
  .hero h1 { font-size: 28px; }
  .dashboard { grid-template-columns: repeat(2, 1fr); }
  .section { padding: 20px; }
  .course-row { flex-direction: column; align-items: flex-start; gap: 12px; }
  .course-row .thumb { width: 100%; height: 120px; }
  .course-row .mini-stats { width: 100%; justify-content: space-around; }
}

@media print {
  .hero { background: var(--primary); }
  .dash-card, .section { box-shadow: none; border: 1px solid #ddd; }
}
</style>
</head>
<body>

<!-- ヒーロー -->
<div class="hero">
